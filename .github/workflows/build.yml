on:
  push:
    paths-ignore:
      - 'README.md'
      - 'keymap-drawer/**'
      - 'keymap_drawer.config.yaml'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'keymap-drawer/**'
      - 'keymap_drawer.config.yaml'
  workflow_dispatch:
    paths-ignore:
      - 'README.md'
      - 'keymap-drawer/**'
      - 'keymap_drawer.config.yaml'

jobs:
  build:
    # PIN: workflow pinned to v0.3.0 so the build toolchain/SDK matches the
    # pre-Zephyr-4.1 zmk revision pinned in config/west.yml. For the 4.1
    # upgrade, change this ref back to @main.
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3.0
