# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command and `artifact-name` to assign a name to
# distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     cmake-args: -DCONFIG_ZMK_USB_LOGGING=y
#     artifact-name: corne_left_with_logging
#
#     Added `nice_view_adapter nice_view` to both shields below since we have
#     the nice view displays.
#
---
include:
  # PIN: pre-Zephyr-4.1 board name (paired with west.yml revision v0.3.0).
  # For the 4.1 upgrade, change `nice_nano_v2` back to `nice_nano//zmk`.
  - board: nice_nano_v2
    shield: corne_left nice_view_adapter nice_view
  - board: nice_nano_v2
    shield: corne_right nice_view_adapter nice_view

    # This builds an artifact to reset base settings, like pairing information
    # etc. Uncomment to build, then flash with this firmware before the real one
    # for each board.
    # - board: nice_nano_v2
    #   shield: settings_reset
